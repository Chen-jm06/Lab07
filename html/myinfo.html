<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chen Jiaming - Personal Profile</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
            --accent-color: #4f46e5;
            --muted-text: #6c757d;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #f8fafc;
                --card-bg: #1e293b;
                --accent-color: #818cf8;
                --muted-text: #94a3b8;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 2.5rem;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-color), #ec4899);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.75rem;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .divider {
            height: 1px;
            background-color: var(--muted-text);
            opacity: 0.2;
            margin: 1.5rem 0;
        }

        .info-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.75rem 0;
            font-size: 0.95rem;
        }

        .info-label {
            color: var(--muted-text);
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
            font-family: monospace;
            font-size: 1.05rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--muted-text);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">CJ</div>
        
        <h1>Chen Jiaming</h1>
        <div class="subtitle">Student Profile</div>
        
        <div class="divider"></div>
        
        <div class="info-group">
            <span class="info-label">Name:</span>
            <span class="info-value">Chen Jiaming</span>
        </div>
        
        <div class="info-group">
            <span class="info-label">Student ID:</span>
            <span class="info-value">20242231</span>
        </div>
        
        <div class="divider"></div>
        
        
    </div>

</body>
</html>
